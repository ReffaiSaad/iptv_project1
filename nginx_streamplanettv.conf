# Nginx config snippet for streamplanettv.online
# Replace certificate paths and root path before deploying
server {
    listen 80;
    server_name streamplanettv.online www.streamplanettv.online;
    # Redirect all HTTP to HTTPS
    return 301 https://streamplanettv.online$request_uri;
}

server {
    listen 443 ssl http2;
    server_name streamplanettv.online www.streamplanettv.online;

    ssl_certificate /etc/letsencrypt/live/streamplanettv.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/streamplanettv.online/privkey.pem;

    root /var/www/streamplanettv; # ADJUST to your actual webroot
    index index.html;

    # Force canonical root
    location = /index.html { return 301 https://streamplanettv.online/; }

    # Ensure legacy .html legal pages point to their canonical versions (adjust if you prefer trailing slash)
    location = /terms.html { return 301 https://streamplanettv.online/terms.html; }
    location = /privacy.html { return 301 https://streamplanettv.online/privacy.html; }

    # Serve static files, try directories then files
    location / {
        try_files $uri $uri/ =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Optional: gzip/static optimizations
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
