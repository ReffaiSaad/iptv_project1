<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50" role="img" aria-label="IPTV Premium Logo">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon mark: stylized play button / signal bars -->
  <rect x="4" y="10" width="6" height="30" rx="3" fill="url(#grad1)" opacity="0.5"/>
  <rect x="13" y="6" width="6" height="38" rx="3" fill="url(#grad1)" opacity="0.7"/>
  <rect x="22" y="2" width="6" height="46" rx="3" fill="url(#grad1)"/>

  <!-- Brand text: IPTV -->
  <text x="36" y="33" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="22" fill="#ffffff" letter-spacing="1">IPTV</text>

  <!-- Brand text: Premium (accent color) -->
  <text x="92" y="33" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-weight="600" font-size="18" fill="url(#grad2)" letter-spacing="0.5">Premium</text>
</svg>
